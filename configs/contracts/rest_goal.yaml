# Single source of truth for the Phase 2/3 REST-goal contract.
#
# Used by:
#   scripts/gates/contract_single_source.py  (gate repo.contract-single-source)
#   scripts/gates/schema_snapshot.py          (gate repo.schema-snapshot)
#
# Why this exists: PR #108 shipped a PARALLEL Phase 2/3 contract module
# (igc/ds/mock_inference_contract.py) with a FORKED namespace
# (phase2_goal_extract vs the canonical phase2_goal_extraction). Its own
# isolated tests were green, so per-module tests could not catch it. These
# repo-level gates assert ONE canonical contract and ONE frozen schema.
version: 1
name: rest_goal_contract

# ---------------------------------------------------------------------------
# SINGLE AUTHORITY. Prose/examples anywhere else in the repo (docs, docstrings,
# smoke fixtures) are illustrative; THIS machine-readable schema is what wins.
# Phase 2/3 are UNORDERED — execution order is NOT part of these contracts; it
# is separate RL-oracle training evidence (see configs/contracts/goal_latent.yaml
# order_evidence_shape). Any producer that emits an ordered handoff (ordered_goals)
# or copies rest_api_list straight into both input and target is NON-COMPLIANT.
authority:
  - "Phase 2 always emits rest_api_list: list[str]."
  - "Phase 3 always emits calls: list[Call]."
  - "One item is still a list of length one."
  - "Phase 2 and Phase 3 are unordered."
  - "Execution order belongs only to the RL training oracle."
  - "Arguments are always an object."
  - "Methods and mutation arguments are explicit; no defaults."
  - "z_rest and z_method are separate encoder outputs."
  - "Literal argument values are retained outside both latents."
  - "No planner, DMTF ontology, or unified latent is in v1."
  - "Examples are illustrative; the machine-readable schema is authoritative."
# ---------------------------------------------------------------------------

# THE one module that owns the Phase 2/3 REST-goal contract. Any canonical
# symbol (below) defined in a different module is a parallel island -> fail.
canonical_module: igc/ds/rest_goal_contract.py

# Tree searched for violations (live package, excludes tests/scripts).
search_root: igc

# Canonical metric namespaces (the accepted values on main).
canonical_namespaces:
  - phase2_goal_extraction      # Phase 2 goal extractor namespace.
  - phase3_argument_extraction  # Phase 3 argument extractor namespace.
  - phase2_labelled_requests    # Phase 2 labelled-request builder namespace.

# Forked namespace tokens that must NEVER appear under search_root. Matched as
# whole tokens (\bTOKEN\b), so the canonical *_extraction values do NOT trip
# them. These two are exactly what #108 introduced.
forbidden_namespace_literals:
  - phase2_goal_extract      # forked short form of phase2_goal_extraction
  - phase3_argument_extract  # forked short form of phase3_argument_extraction

# Retired parallel-contract module/symbol names. Unlike the whole-token text
# scan above, these must never reappear under search_root as a FILENAME
# (matched as the glob NAME*.py on the file stem), a def/class name, or an
# import target (import ...NAME / from ...NAME import ...). This is exactly the
# module PR #108 forked (igc/ds/mock_inference_contract.py) plus the phase23_mock
# throwaway; renaming the file alone does not escape the gate.
forbidden_module_names:
  - mock_inference_contract  # the #108 parallel Phase 2/3 contract island module
  - phase23_mock             # throwaway combined Phase 2/3 mock contract name

# def/class names that may be DEFINED only inside canonical_module. A second
# definition anywhere under search_root is a duplicate contract island.
canonical_symbols:
  - build_d1_rest_api_list_row
  - build_call_row
  - render_rest_api_list_example
  - render_call_example
  - parse_rest_api_list_y_pred
  - parse_calls_y_pred
  - evaluate_rest_api_list_y_pred
  - evaluate_calls
  - RenderedContractExample
  - RedfishContext

# Locked task strings emitted in the canonical rows (informational; the schema
# gate freezes the full shape).
canonical_tasks:
  - text_to_rest_api_list
  - text_and_rest_api_list_to_calls
