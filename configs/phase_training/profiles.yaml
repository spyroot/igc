      train_gpu_memory_allocated_gb: phase3_argument_extract/gpu_memory_allocated_gb
      train_gpu_memory_reserved_gb: phase3_argument_extract/gpu_memory_reserved_gb
      train_optimizer_step: phase3_argument_extract/optimizer_step
      train_epoch: phase3_argument_extract/epoch
