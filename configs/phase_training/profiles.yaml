      train_lr: phase2_goal_extract/learning_rate
      train_grad_norm: phase2_goal_extract/grad_norm
      train_tokens_per_second: phase2_goal_extract/tokens_per_second
      train_samples_per_second: phase2_goal_extract/samples_per_second
      train_padding_ratio: phase2_goal_extract/padding_ratio
      train_gpu_memory_allocated_gb: phase2_goal_extract/gpu_memory_allocated_gb
      train_gpu_memory_reserved_gb: phase2_goal_extract/gpu_memory_reserved_gb
      train_optimizer_step: phase2_goal_extract/optimizer_step
      train_epoch: phase2_goal_extract/epoch
      eval_json_valid_rate: phase2_eval/json_valid_rate
      eval_schema_valid_rate: phase2_eval/schema_valid_rate
      eval_rest_api_list_ordered_exact_match: phase2_eval/rest_api_list_ordered_exact_match
