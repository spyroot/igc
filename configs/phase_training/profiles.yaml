schema_version: igc.phase_training.v1
phases:
  - phase1_pretrain
  - phase2_goal_extract
  - phase3_argument_extract
default_profiles:
  phase1_pretrain: phase1_gpt2_smoke
  phase2_goal_extract: phase2_gpt2_smoke
  phase3_argument_extract: phase3_gpt2_smoke
gpu_default_profiles:
  phase1_pretrain: phase1_qwen2_5_7b_rslora
  phase2_goal_extract: phase2_qwen2_5_7b_rslora
  phase3_argument_extract: phase3_qwen2_5_7b_rslora

datasets:
  phase1_full_corpus:
    objective: redfish_json_reconstruction
    jsonl: /models/igc/phase1_corpus/phase1_redfish_json_full.jsonl
    build:
      corpus_root: /workspace/igc/redfish_ctl/full_corpus
      require_full_corpus: true
      require_rest_api_map: true
      require_manifest: true
      required_archives:
        - dell_xr8620t_full_corpus.tar.gz
        - hpe_dl360_full_corpus.tar.gz
        - supermicro_gb300_full_corpus.tar.gz
        - supermicro_x10_full_corpus.tar.gz

  phase2_d1_rest_goals:
    objective: ordered_rest_goal_extraction
    jsonl: /models/igc/goal-datasets/D1_ordered_rest_goals.jsonl
    depends_on:
      - phase1_full_corpus
    build:
      source_jsonl: /models/igc/phase1_corpus/phase1_redfish_json_full.jsonl
      label_source: pro_reviewed_operator_text
      target_key: rest_api_list

  phase3_d2_method_arguments:
    objective: ordered_method_argument_extraction
    jsonl: /models/igc/goal-datasets/D2_ordered_method_arguments.jsonl
    depends_on:
      - phase2_d1_rest_goals
    build:
      source_jsonl: /models/igc/goal-datasets/D1_ordered_rest_goals.jsonl
      target_key: calls
      preserve_order: true

models:
  gpt2:
    model_type: gpt2
    trust_remote_code: false
    torch_dtype: float32

  qwen2_5_7b:
    model_type: Qwen/Qwen2.5-7B-Instruct
    trust_remote_code: true
    torch_dtype: bfloat16

optimizers:
  adamw_phase_smoke:
    name: adamw_torch_fused
    learning_rate: 0.00005
    weight_decay: 0.01
    betas: [0.9, 0.95]
    eps: 0.00000001
    max_grad_norm: 1.0
    scheduler: cosine
    warmup_ratio: 0.03

  adamw_phase_lora:
    name: adamw_torch_fused
    learning_rate: 0.0002
    weight_decay: 0.0
    betas: [0.9, 0.95]
    eps: 0.00000001
    max_grad_norm: 1.0
    scheduler: cosine
    warmup_ratio: 0.03

peft:
  qwen_rslora_32:
    enabled: true
    method: rslora
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    bias: none
    use_rslora: true
    use_dora: false
    init_lora_weights: true
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

metric_sets:
  phase1_pretrain:
    event_fields:
      - record_index
      - rest_api
      - allowed_methods
      - vendor
      - model_profile
      - dataset_jsonl
      - source_archive
      - prompt_token_count
      - target_token_count
      - total_token_count
      - train_loss
      - learning_rate
      - grad_norm
      - tokens_per_second
      - samples_per_second
      - padding_ratio
      - gpu_memory_allocated_gb
      - gpu_memory_reserved_gb
      - json_valid
      - json_reconstruction_exact_match
      - rest_api_exact_match
      - allowed_methods_exact_match
      - schema_valid
      - inference_latency_ms
    plot_names:
      dataset_records: phase1_dataset/record_count
      dataset_unique_rest_api_count: phase1_dataset/unique_rest_api_count
      dataset_unique_resource_type_count: phase1_dataset/unique_resource_type_count
      dataset_method_get_rate: phase1_dataset/method_get_rate
      dataset_method_post_rate: phase1_dataset/method_post_rate
      dataset_method_patch_rate: phase1_dataset/method_patch_rate
      dataset_method_put_rate: phase1_dataset/method_put_rate
      dataset_method_delete_rate: phase1_dataset/method_delete_rate
      dataset_prompt_tokens_mean: phase1_dataset/prompt_token_count_mean
      dataset_target_tokens_mean: phase1_dataset/target_token_count_mean
      dataset_total_tokens_p95: phase1_dataset/total_tokens_p95
      train_loss: phase1_pretrain/train_loss
      train_ppl: phase1_pretrain/train_ppl
      train_lr: phase1_pretrain/learning_rate
      train_grad_norm: phase1_pretrain/grad_norm
      train_tokens_per_second: phase1_pretrain/tokens_per_second
      train_samples_per_second: phase1_pretrain/samples_per_second
      train_padding_ratio: phase1_pretrain/padding_ratio
      train_gpu_memory_allocated_gb: phase1_pretrain/gpu_memory_allocated_gb
      train_gpu_memory_reserved_gb: phase1_pretrain/gpu_memory_reserved_gb
      train_optimizer_step: phase1_pretrain/optimizer_step
      train_epoch: phase1_pretrain/epoch
      eval_json_valid_rate: phase1_eval/json_valid_rate
      eval_schema_valid_rate: phase1_eval/schema_valid_rate
      eval_json_reconstruction_exact_match: phase1_eval/json_reconstruction_exact_match
      eval_rest_api_exact_match: phase1_eval/rest_api_exact_match
      eval_allowed_methods_exact_match: phase1_eval/allowed_methods_exact_match
      eval_inference_latency_ms_p50: phase1_eval/inference_latency_ms_p50
      eval_inference_latency_ms_p95: phase1_eval/inference_latency_ms_p95

  phase2_goal_extract:
