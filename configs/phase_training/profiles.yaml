      - record_index
      - instruction
      - model_profile
      - dataset_jsonl
      - rest_api_list
      - rest_api_list_length
      - order_relation
      - prompt_token_count
      - target_token_count
      - total_token_count
      - train_loss
      - learning_rate
      - grad_norm
      - tokens_per_second
      - samples_per_second
      - padding_ratio
      - gpu_memory_allocated_gb
      - gpu_memory_reserved_gb
      - json_valid
      - schema_valid
      - rest_api_list_ordered_exact_match
      - rest_api_list_set_f1
      - hallucinated_endpoint
      - text_interface_success
      - inference_latency_ms
    plot_names:
