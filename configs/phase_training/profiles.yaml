      eval_inference_latency_ms_p95: phase3_eval/inference_latency_ms_p95

profiles:
  phase1_gpt2_smoke:
    phase: phase1_pretrain
    objective: redfish_json_reconstruction
    description: CPU/GPU smoke over a small slice of the full Redfish JSON reconstruction data.
    tracking:
      report_to: wandb
      entity: spyroot
      project: igc
      metric_prefix: phase1_pretrain
      metric_set: phase1_pretrain
    dataset:
      ref: phase1_full_corpus
      max_records: 64
    model:
      ref: gpt2
    optimizer:
      ref: adamw_phase_smoke
    trainer:
      output_dir: /models/igc/checkpoints/phase1_pretrain/gpt2_smoke
      epochs: 1
      batch_size: 1
      gradient_accumulation_steps: 1
      max_length: 1024
      max_steps: 8
      precision: fp32
      dataloader_num_workers: 0
      gradient_checkpointing: false
      torch_compile: false
      tf32: true
      seed: 42
      log_every: 1
    distributed:
      launcher: torchrun
      nproc_per_node: 1
      backend: nccl

  phase1_qwen2_5_7b_rslora:
    phase: phase1_pretrain
    objective: redfish_json_reconstruction
    description: Full-corpus Phase 1 adapter pretraining for the 7B candidate backbone.
    tracking:
      report_to: wandb
      entity: spyroot
      project: igc
      metric_prefix: phase1_pretrain
      metric_set: phase1_pretrain
    dataset:
      ref: phase1_full_corpus
      max_records: null
    model:
      ref: qwen2_5_7b
    optimizer:
      ref: adamw_phase_lora
    peft:
      ref: qwen_rslora_32
    trainer:
      output_dir: /models/igc/checkpoints/phase1_pretrain/qwen2_5_7b_rslora
      epochs: 3
      batch_size: 1
      gradient_accumulation_steps: 16
      max_length: 1536
      max_steps: null
      precision: bf16
      dataloader_num_workers: 4
      gradient_checkpointing: true
      torch_compile: false
      tf32: true
      seed: 42
      log_every: 20
    distributed:
      launcher: torchrun
      nproc_per_node: 4
      backend: nccl

  phase2_gpt2_smoke:
    phase: phase2_goal_extract
    objective: ordered_rest_goal_extraction
    description: Offline smoke for D1 text-to-ordered-REST-goal extraction.
    tracking:
      report_to: wandb
      entity: spyroot
      project: igc
      metric_prefix: phase2_goal_extract
      metric_set: phase2_goal_extract
    dataset:
      ref: phase2_d1_rest_goals
      max_records: 64
    model:
      ref: gpt2
    optimizer:
      ref: adamw_phase_smoke
    trainer:
      output_dir: /models/igc/checkpoints/phase2_goal_extract/gpt2_smoke
      epochs: 1
      batch_size: 1
      gradient_accumulation_steps: 1
      max_length: 1024
      max_steps: 8
      precision: fp32
      dataloader_num_workers: 0
      gradient_checkpointing: false
      torch_compile: false
      tf32: true
      seed: 42
      log_every: 1
    distributed:
      launcher: torchrun
      nproc_per_node: 1
      backend: nccl

  phase2_qwen2_5_7b_rslora:
    phase: phase2_goal_extract
    objective: ordered_rest_goal_extraction
    description: Phase 2 text-to-ordered-REST-goal adapter fine-tune.
    tracking:
      report_to: wandb
      entity: spyroot
      project: igc
      metric_prefix: phase2_goal_extract
      metric_set: phase2_goal_extract
    dataset:
      ref: phase2_d1_rest_goals
      max_records: null
    model:
      ref: qwen2_5_7b
    optimizer:
      ref: adamw_phase_lora
    peft:
      ref: qwen_rslora_32
    trainer:
      output_dir: /models/igc/checkpoints/phase2_goal_extract/qwen2_5_7b_rslora
      epochs: 3
      batch_size: 1
      gradient_accumulation_steps: 16
      max_length: 1536
      max_steps: null
      precision: bf16
      dataloader_num_workers: 4
      gradient_checkpointing: true
      torch_compile: false
      tf32: true
      seed: 42
      log_every: 20
    distributed:
      launcher: torchrun
      nproc_per_node: 4
      backend: nccl

  phase3_gpt2_smoke:
    phase: phase3_argument_extract
    objective: ordered_method_argument_extraction
    description: Offline smoke for D2 text+REST-list to ordered method/argument calls.
    tracking:
      report_to: wandb
      entity: spyroot
      project: igc
      metric_prefix: phase3_argument_extract
