      eval_order_relation_exact_match: phase2_eval/order_relation_exact_match
      eval_hallucinated_endpoint_rate: phase2_eval/hallucinated_endpoint_rate
      eval_text_interface_success: phase2_eval/text_interface_success
      eval_inference_latency_ms_p50: phase2_eval/inference_latency_ms_p50
      eval_inference_latency_ms_p95: phase2_eval/inference_latency_ms_p95

