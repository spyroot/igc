profile:
  name: phase3_argument_extractor_smoke
  prompt_spec_version: phase3-argument-extractor-smoke-v2
  task: text_and_rest_api_list_to_calls
  base_weights_role: goal_extractor
  weights_role: argument_extractor
  renderer: render_call_example

smoke:
  fixtures:
    - read_only_get
    - patch_with_arguments
  provider_modes:
    - mock
    - file

wandb:
  namespace: phase3_argument_extraction
  metric_keys:
    - phase3_argument_extraction/eval/call_set_exact_match_rate
    - phase3_argument_extraction/eval/rest_api_set_match_rate
    - phase3_argument_extraction/eval/method_exact_match_rate
    - phase3_argument_extraction/eval/arguments_json_validity_rate
    - phase3_argument_extraction/eval/arguments_exact_match_rate
    - phase3_argument_extraction/eval/required_argument_coverage_rate
    - phase3_argument_extraction/eval/no_argument_accuracy_rate
    - phase3_argument_extraction/eval/unsafe_argument_rejection_rate
    - phase3_argument_extraction/eval/invalid_method_rate
    - phase3_argument_extraction/smoke/rows_total
    - phase3_argument_extraction/smoke/parsed_total
    - phase3_argument_extraction/smoke/accepted_total
    - phase3_argument_extraction/smoke/prompt_spec_version
    - phase3_argument_extraction/smoke/weights_role

acceptance:
  min_call_set_exact_match_rate: 1.0
  min_method_exact_match_rate: 1.0
  min_arguments_json_validity_rate: 1.0
  min_arguments_exact_match_rate: 1.0
  min_required_argument_coverage_rate: 1.0
  min_no_argument_accuracy_rate: 1.0
  min_unsafe_argument_rejection_rate: 1.0
  max_invalid_method_rate: 0.0
