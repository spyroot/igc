# Judge calibration suite (human-authored ground truth).
#
# Used by scripts/gates/judge_calibration.py (gate judge.calibration). Before the
# Pro judge is trusted at scale to accept/reject Phase 2 D1 drafts, it must agree
# with this small hand-labelled suite. Each case pins the (sampled API set,
# operator text) relationship and the verdict a correctly-calibrated judge must
# return. `reference_judge_response` is the JSON a good judge emits — used for the
# offline deterministic check; the real Pro judge is called on (text, sampled set)
# in the cluster run and its verdict is scored against `expected_accepted`.
#
# SEED suite: 1 case per category. Expand with real hand-labelled examples before
# trusting the judge at dataset scale. Only `correct_*` categories accept.
version: 1
# Categories whose false-accept is dangerous (a bad D1 row enters the dataset).
# A single judge false-accept in any of these fails the gate.
zero_false_accept_categories:
  - missing_api
  - extra_api
  - duplicate
  - method_incompatible
  - nonsense
  - reversed_explicit_order
  - ambiguous

cases:
  - id: correct-single
    category: correct_single_api
    text: "power on system 1"
    sampled_rest_api_list: ["/redfish/v1/Systems/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET", "PATCH"] }
    expected_accepted: true
    reference_judge_response: '{"accepted": true, "rest_api_list": ["/redfish/v1/Systems/1"], "nonsense": false}'

  - id: correct-multi
    category: correct_multi_api
    text: "check system 1 power and manager 1 status"
    sampled_rest_api_list: ["/redfish/v1/Systems/1", "/redfish/v1/Managers/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"], "/redfish/v1/Managers/1": ["GET"] }
    expected_accepted: true
    reference_judge_response: '{"accepted": true, "rest_api_list": ["/redfish/v1/Systems/1", "/redfish/v1/Managers/1"], "nonsense": false}'

  - id: reversed-order
    category: reversed_explicit_order
    text: "first read manager 1, then system 1"   # explicit order; sampled order is the opposite
    sampled_rest_api_list: ["/redfish/v1/Systems/1", "/redfish/v1/Managers/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"], "/redfish/v1/Managers/1": ["GET"] }
    expected_accepted: false
    reference_judge_response: '{"accepted": false, "rest_api_list": ["/redfish/v1/Managers/1", "/redfish/v1/Systems/1"], "nonsense": false, "order_evidence": "explicit_then", "reason": "explicit order reversed vs sampled set"}'

  - id: missing-api
    category: missing_api
    text: "power on system 1"                     # text names only 1 of 2 sampled APIs
    sampled_rest_api_list: ["/redfish/v1/Systems/1", "/redfish/v1/Managers/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"], "/redfish/v1/Managers/1": ["GET"] }
    expected_accepted: false
    reference_judge_response: '{"accepted": false, "rest_api_list": ["/redfish/v1/Systems/1"], "nonsense": false, "reason": "text omits Managers/1"}'

  - id: extra-api
    category: extra_api
    text: "power on system 1 and reset manager 1"  # text names an API not in the sampled set
    sampled_rest_api_list: ["/redfish/v1/Systems/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET", "PATCH"] }
    expected_accepted: false
    reference_judge_response: '{"accepted": false, "rest_api_list": ["/redfish/v1/Systems/1", "/redfish/v1/Managers/1"], "nonsense": false, "reason": "text adds Managers/1 not in sampled set"}'

  - id: duplicate
    category: duplicate
    text: "read system 1, then read system 1 again"
    sampled_rest_api_list: ["/redfish/v1/Systems/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"] }
    expected_accepted: false
    reference_judge_response: '{"accepted": false, "rest_api_list": ["/redfish/v1/Systems/1", "/redfish/v1/Systems/1"], "nonsense": false, "reason": "duplicate command"}'

  - id: ambiguous
    category: ambiguous
    text: "check the thing"                        # too vague to map to a concrete API
    sampled_rest_api_list: ["/redfish/v1/Systems/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"] }
    expected_accepted: false
    reference_judge_response: '{"accepted": false, "rest_api_list": [], "nonsense": false, "reason": "ambiguous, no concrete API"}'

  - id: method-incompatible
    category: method_incompatible
    text: "delete system 1"                        # DELETE not in allowed_methods
    sampled_rest_api_list: ["/redfish/v1/Systems/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET", "PATCH"] }
    expected_accepted: false
    reference_judge_response: '{"accepted": false, "rest_api_list": ["/redfish/v1/Systems/1"], "nonsense": false, "reason": "DELETE not allowed on Systems/1"}'

  - id: nonsense
    category: nonsense
    text: "banana helicopter redfish"             # junk, not an operator request
    sampled_rest_api_list: ["/redfish/v1/Systems/1"]
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"] }
    expected_accepted: false
    reference_judge_response: '{"accepted": false, "rest_api_list": [], "nonsense": true, "reason": "not an operator request"}'
