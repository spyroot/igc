# Generator qualification (model_x draft quality on a small fixed API sample).
#
# Used by scripts/gates/generator_qualification.py (gate generator.qualification).
# Before a large Phase 2 D1 build, run model_x on this fixed API sample, judge the
# drafts, and measure the five rates below — the baseline the full build is
# compared against. If the generator is below/above threshold on the small sample,
# do not scale the build.
#
# Offline (CI): the committed `records` (draft text + reference judge response)
# validate the metric computation + thresholds deterministically. Cluster run:
# model_x generates the text for each sampled API set and the real Pro judge scores
# it — BLOCKED while Brain/GB300 is off.
version: 1

thresholds:
  min_valid_text_rate: 0.8          # drafts must be well-formed operator text
  min_judge_acceptance_rate: 0.5    # at least half accepted by the judge
  max_duplicate_intent_rate: 0.20   # repeated same command
  max_unsupported_intent_rate: 0.20 # references an API/method outside the allowed context
  max_ambiguous_command_rate: 0.20  # too vague to map to a concrete API

# Baseline fixture: representative model_x-style drafts + reference judge verdicts.
records:
  - text: "power on system 1"
    allowed_methods: { "/redfish/v1/Systems/1": ["GET", "PATCH"] }
    judge_response: '{"accepted": true, "rest_api_list": ["/redfish/v1/Systems/1"], "nonsense": false}'
  - text: "read system 1 and manager 1"
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"], "/redfish/v1/Managers/1": ["GET"] }
    judge_response: '{"accepted": true, "rest_api_list": ["/redfish/v1/Systems/1", "/redfish/v1/Managers/1"], "nonsense": false}'
  - text: "check chassis 1 status"
    allowed_methods: { "/redfish/v1/Chassis/1": ["GET"] }
    judge_response: '{"accepted": true, "rest_api_list": ["/redfish/v1/Chassis/1"], "nonsense": false}'
  - text: "read system 1 then read system 1"
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"] }
    judge_response: '{"accepted": false, "rest_api_list": ["/redfish/v1/Systems/1", "/redfish/v1/Systems/1"], "nonsense": false, "reason": "duplicate"}'
  - text: "do the thing"
    allowed_methods: { "/redfish/v1/Systems/1": ["GET"] }
    judge_response: '{"accepted": false, "rest_api_list": [], "nonsense": false, "reason": "ambiguous"}'
