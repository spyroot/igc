name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-aware change detection so downstream jobs skip when a change cannot
  # affect them (docs-only PRs run nothing heavy; docker only rebuilds when the
  # image inputs changed). Plain git diff — no third-party actions. A skipped
  # job reports Success to branch protection, so required checks still pass.
  changes:
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      python: ${{ steps.filter.outputs.python }}
      perf: ${{ steps.filter.outputs.perf }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff against the base/previous ref
      - name: Detect changed areas
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch -q origin "${{ github.base_ref }}"
            files=$(git diff --name-only "$(git merge-base "$base" HEAD)"...HEAD)
          else
            # push to main: diff against the pre-push head; fall back to the
            # first parent (merge commits) and finally to run-everything.
            before="${{ github.event.before }}"
            if [ -n "$before" ] && git cat-file -e "$before" 2>/dev/null; then
              files=$(git diff --name-only "$before"..HEAD)
            elif git rev-parse -q --verify HEAD^ >/dev/null; then
              files=$(git diff --name-only HEAD^..HEAD)
            else
              files=""
            fi
          fi
          if [ -z "$files" ]; then
            # unknown diff (new branch, force push): be safe, run everything
            {
              echo "shell=true"
              echo "python=true"
              echo "perf=true"
              echo "docker=true"
            } >> "$GITHUB_OUTPUT"
            echo "no diff base found — running all jobs"
            exit 0
          fi
          echo "$files"
          match() { echo "$files" | grep -qE "$1" && echo true || echo false; }
          # the workflow itself changing re-runs everything
          wf='^\.github/workflows/'
          {
            echo "shell=$(match "$wf|^scripts/.*\.(sh|sbatch)$|^tests/bats/|^collector\.sh$")"
            echo "python=$(match "$wf|^igc/|^tests/|^configs/|^scripts/.*\.py$|^docker/requirements|^pytest\.ini$|^setup\.py$|^igc_main\.py$|^igc_ctl\.py$|^redfish_ctl")"
            echo "perf=$(match "$wf|^igc/|^tests/perf/|^scripts/bench_hot_paths\.py$|^redfish_ctl")"
            echo "docker=$(match "$wf|^docker/|^requirements|^setup\.py$|^conda-recipe\.yaml$")"
          } >> "$GITHUB_OUTPUT"

  shell:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - name: Install shell test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: Bash syntax
        shell: bash
        run: bash -n scripts/*.sh scripts/*.sbatch tests/bats/*.bats
      - name: ShellCheck
        shell: bash
        run: shellcheck scripts/*.sh scripts/*.sbatch tests/bats/*.bats
      - name: Bats
        shell: bash
        run: bats tests/bats

  gate:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r docker/requirements-test.txt
          pip install ruff
      - name: Run orchestration dry-runs
        shell: bash
        run: |
          python scripts/render_run.py --spec configs/run/examples/docker-smoke.yaml >/tmp/docker-plan.txt
          python scripts/render_run.py --spec configs/run/examples/slurm-smoke.yaml >/tmp/slurm-plan.txt
          python scripts/launch_run.py --spec configs/run/examples/docker-smoke.yaml --dry-run >/tmp/launch-plan.txt
          python scripts/docker_image_sync.py --spec configs/run/examples/docker-smoke.yaml --dry-run >/tmp/docker-sync-plan.txt
          python scripts/slurm_sanity_from_spec.py --spec configs/run/examples/slurm-smoke.yaml --dry-run >/tmp/slurm-sanity-plan.txt
      - name: Lint
        run: ruff check igc tests
      - name: Offline gate with coverage
        shell: bash
        run: |
          set -o pipefail
          KMP_DUPLICATE_LIB_OK=TRUE OMP_NUM_THREADS=1 TRANSFORMERS_OFFLINE=1 HF_DATASETS_OFFLINE=1 \
            python -m pytest -q --cov=igc --cov-report=term --cov-report=xml --cov-report=json
      - name: Metrics snapshot
        shell: bash
        run: |
          python scripts/metrics_snapshot.py --coverage-json coverage.json --out metrics.json | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage and metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-py${{ matrix.python-version }}-${{ github.sha }}
          path: |
            coverage.xml
            coverage.json
            metrics.json
          retention-days: 90

  perf:
    needs: [changes, shell, gate]
    # run only when hot-path inputs changed; tolerate skipped (not failed) deps
    if: >-
      !cancelled() &&
      needs.changes.outputs.perf == 'true' &&
      needs.shell.result != 'failure' &&
      needs.gate.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r docker/requirements-test.txt
      - name: Perf budgets
        shell: bash
        run: |
          set -o pipefail
          KMP_DUPLICATE_LIB_OK=TRUE OMP_NUM_THREADS=1 python -m pytest -m perf -q

  docker:
    needs: [changes, shell, gate]
    # rebuild/push the image only when its inputs changed (Dockerfiles,
    # requirements, packaging) — a docs or pure-Python merge no longer mints a
    # new sha-tagged image on every push to main.
    if: >-
      !cancelled() &&
      github.event_name == 'push' &&
      needs.changes.outputs.docker == 'true' &&
      needs.shell.result != 'failure' &&
      needs.gate.result != 'failure'
    runs-on: ubuntu-latest
    # secrets are NOT available in `if:` conditionals; surface them as env, then gate on env.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - uses: docker/setup-buildx-action@v3
      - name: Build and smoke test
        run: |
          docker build -f docker/Dockerfile.test -t igc-test:ci .
          docker run --rm -e TRANSFORMERS_OFFLINE=1 -e HF_DATASETS_OFFLINE=1 igc-test:ci python -m pytest -q
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Tag and push
        if: env.DOCKERHUB_USERNAME != ''
        run: |
          docker tag igc-test:ci "$DOCKERHUB_USERNAME/igc-test:latest"
          docker tag igc-test:ci "$DOCKERHUB_USERNAME/igc-test:${{ github.sha }}"
          docker push "$DOCKERHUB_USERNAME/igc-test:latest"
          docker push "$DOCKERHUB_USERNAME/igc-test:${{ github.sha }}"
