name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - name: Install shell test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck
      - name: Bash syntax
        shell: bash
        run: bash -n scripts/*.sh scripts/*.sbatch tests/bats/*.bats
      - name: ShellCheck
        shell: bash
        run: shellcheck scripts/*.sh scripts/*.sbatch tests/bats/*.bats
      - name: Bats
        shell: bash
        run: bats tests/bats

  gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r docker/requirements-test.txt
          pip install ruff
      - name: Lint
        run: ruff check igc tests
      - name: Offline gate with coverage
        shell: bash
        run: |
          set -o pipefail
          KMP_DUPLICATE_LIB_OK=TRUE OMP_NUM_THREADS=1 TRANSFORMERS_OFFLINE=1 HF_DATASETS_OFFLINE=1 \
            pytest -q --cov=igc --cov-report=term --cov-report=xml --cov-report=json
      - name: Metrics snapshot
        shell: bash
        run: |
          python scripts/metrics_snapshot.py --coverage-json coverage.json --out metrics.json | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage and metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-py${{ matrix.python-version }}-${{ github.sha }}
          path: |
            coverage.xml
            coverage.json
            metrics.json
          retention-days: 90

  perf:
    needs: [shell, gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r docker/requirements-test.txt
      - name: Perf budgets
        shell: bash
        run: |
          set -o pipefail
          KMP_DUPLICATE_LIB_OK=TRUE OMP_NUM_THREADS=1 pytest -m perf -q

  docker:
    needs: [shell, gate]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # secrets are NOT available in `if:` conditionals; surface them as env, then gate on env.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - uses: docker/setup-buildx-action@v3
      - name: Build and smoke test
        run: |
          docker build -f docker/Dockerfile.test -t igc-test:ci .
          docker run --rm igc-test:ci pytest -q
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Tag and push
        if: env.DOCKERHUB_USERNAME != ''
        run: |
          docker tag igc-test:ci "$DOCKERHUB_USERNAME/igc-test:latest"
          docker tag igc-test:ci "$DOCKERHUB_USERNAME/igc-test:${{ github.sha }}"
          docker push "$DOCKERHUB_USERNAME/igc-test:latest"
          docker push "$DOCKERHUB_USERNAME/igc-test:${{ github.sha }}"
