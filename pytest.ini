[pytest]
; Offline gate configuration: `pytest -q` from the repo root must collect ONLY igc's own
; tests (never the idrac_ctl submodule's suite) and must stay green on a CPU box with no
; network, GPU, HuggingFace downloads, or live Redfish host (TEAM_GUIDE verification gate).
testpaths = tests
norecursedirs = idrac_ctl thirdparty .claude .codex .git datasets experiments

; Heavy/opt-in markers mandated by TEAM_GUIDE — marked tests are excluded from the default
; run and enabled explicitly, e.g. `pytest -m gpu`.
markers =
    gpu: needs a GPU (excluded from the offline gate)
    slow: long-running (excluded from the offline gate)
    download: needs network / HuggingFace downloads (excluded from the offline gate)
    dataset: needs the captured ~/.json_responses dataset staged (excluded from the offline gate)
    live: needs a live Redfish/BMC host (never run unattended)
    perf: hot-path performance budgets (run explicitly: pytest -m perf)

addopts = -m "not gpu and not slow and not download and not dataset and not live and not perf"
