<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The sql environment as a GoalEnvironment adapter</title>
<desc>An agent emits ToolActions to a SqlEnv that implements the same GoalEnvironment interface as the Redfish and github envs, backed by an in-memory SQLite database that is its own deterministic simulator. A trajectory inspects schema, mutates inside a transaction, and verifies with an exact SELECT. A callout shows how a transaction gives dry-run (ROLLBACK) versus execute (COMMIT, after the approval gate).</desc>
<style>
svg{--surface-2:#ffffff;--surface-1:#f7f7f5;--surface-0:#f0efea;--text-primary:#1f1e1b;--text-secondary:#57564f;--text-muted:#8a897f;--border:#e3e2dc;--border-strong:#cbcabf}
.t,.th,.ts{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:var(--text-primary)}
.t,.th{font-size:14px}.th{font-weight:500}.ts{font-size:12px;fill:var(--text-secondary)}
rect.c-teal{fill:#E1F5EE;stroke:#5DCAA5}.c-teal text{fill:#04342C}
rect.c-coral{fill:#FAECE7;stroke:#F0997B}.c-coral text{fill:#7A2E15}
rect.c-amber{fill:#FBF1DD;stroke:#E9C277}.c-amber text{fill:#5A3D10}
rect.c-purple{fill:#EEEDFE;stroke:#AFA9EC}.c-purple text{fill:#26215C}
@media (prefers-color-scheme:dark){svg{--surface-2:#26251f;--surface-1:#201f1a;--surface-0:#1a1915;--text-primary:#ECEAE0;--text-secondary:#B8B6AA;--border:#3a392f;--border-strong:#4a493d}rect.c-teal{fill:#0F3E33;stroke:#1D9E75}.c-teal text{fill:#9FE1CB}rect.c-coral{fill:#3E2417;stroke:#D85A30}.c-coral text{fill:#F5C4B3}rect.c-amber{fill:#3A2E12;stroke:#C79A3A}.c-amber text{fill:#E9C277}rect.c-purple{fill:#2A2550;stroke:#7F77DD}.c-purple text{fill:#CECBF6}}
</style>
<defs>
<marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-secondary)"/></marker>
</defs>

<text class="th" x="40" y="26">The sql env: a database as a tool domain, self-simulating</text>

<rect x="40" y="40" width="600" height="46" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text class="th" x="58" y="60">Goal</text>
<text class="ts" x="58" y="78">deactivate every user inactive for more than 90 days</text>
<text class="ts" x="624" y="62" text-anchor="end">verify() → 0 active stale users</text>

<rect x="40" y="110" width="118" height="88" rx="8" fill="var(--surface-1)" stroke="var(--border)"/>
<text class="th" x="99" y="146" text-anchor="middle">Agent</text>
<text class="ts" x="99" y="164" text-anchor="middle">+ planner</text>
<text class="ts" x="99" y="182" text-anchor="middle">emits ToolAction</text>

<rect x="196" y="100" width="234" height="108" rx="8" fill="var(--surface-1)" stroke="var(--border-strong)"/>
<text class="th" x="313" y="120" text-anchor="middle">SqlEnv</text>
<text class="ts" x="313" y="136" text-anchor="middle">implements GoalEnvironment</text>
<text class="ts" x="208" y="158">reset(goal) → Observation</text>
<text class="ts" x="208" y="172">available_actions → [ToolAction]</text>
<text class="ts" x="208" y="186">step(action) → Transition</text>
<text class="ts" x="208" y="200">verify(goal, obs) → bool</text>

<rect x="468" y="110" width="162" height="88" rx="8" fill="var(--surface-1)" stroke="var(--border)"/>
<text class="th" x="549" y="132" text-anchor="middle">SQLite</text>
<text class="ts" x="549" y="150" text-anchor="middle">in-memory backend</text>
<text class="ts" x="549" y="167" text-anchor="middle">is its own simulator</text>
<text class="ts" x="549" y="184" text-anchor="middle">(no cassette needed)</text>

<line x1="158" y1="138" x2="192" y2="138" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>
<text class="ts" x="175" y="131" text-anchor="middle">step</text>
<line x1="196" y1="170" x2="162" y2="170" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>
<text class="ts" x="177" y="185" text-anchor="middle">obs</text>
<line x1="430" y1="138" x2="464" y2="138" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>
<text class="ts" x="449" y="131" text-anchor="middle">query</text>
<line x1="468" y1="170" x2="434" y2="170" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>
<text class="ts" x="450" y="185" text-anchor="middle">rows</text>

<text class="ts" x="313" y="224" text-anchor="middle">same ABC as redfish_env · github_env · filesystem_env</text>

<text class="ts" x="40" y="244">inspect → mutate inside a transaction → verify() runs an exact SELECT compare:</text>

<g class="c-teal"><rect class="c-teal" x="40" y="256" width="108" height="44" rx="6"/><text class="ts" x="94" y="275" text-anchor="middle">1 list</text><text class="ts" x="94" y="289" text-anchor="middle">tables</text></g>
<g class="c-teal"><rect class="c-teal" x="163" y="256" width="108" height="44" rx="6"/><text class="ts" x="217" y="275" text-anchor="middle">2 describe</text><text class="ts" x="217" y="289" text-anchor="middle">users</text></g>
<g class="c-teal"><rect class="c-teal" x="286" y="256" width="108" height="44" rx="6"/><text class="ts" x="340" y="275" text-anchor="middle">3 select</text><text class="ts" x="340" y="289" text-anchor="middle">stale rows</text></g>
<g class="c-amber"><rect class="c-amber" x="409" y="256" width="108" height="44" rx="6"/><text class="ts" x="463" y="275" text-anchor="middle">4 update</text><text class="ts" x="463" y="289" text-anchor="middle">active=0</text></g>
<g class="c-teal"><rect class="c-teal" x="532" y="256" width="108" height="44" rx="6"/><text class="ts" x="586" y="275" text-anchor="middle">5 verify</text><text class="ts" x="586" y="289" text-anchor="middle">select</text></g>

<line x1="148" y1="278" x2="163" y2="278" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>
<line x1="271" y1="278" x2="286" y2="278" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>
<line x1="394" y1="278" x2="409" y2="278" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>
<line x1="517" y1="278" x2="532" y2="278" stroke="var(--text-secondary)" marker-end="url(#arr2)"/>

<rect x="40" y="312" width="600" height="62" rx="8" fill="var(--surface-2)" stroke="var(--border-strong)"/>
<text class="th" x="56" y="332">Why sql is special: the transaction is a free guardrail</text>
<text class="ts" x="56" y="351">BEGIN → apply the UPDATE → SELECT to check the result, then:</text>
<text class="ts" x="56" y="367">ROLLBACK = dry-run preview (nothing persisted)   ·   COMMIT = execute, only after the approval gate</text>

<g class="c-teal"><rect class="c-teal" x="40" y="386" width="96" height="22" rx="11"/><text class="ts" x="88" y="401" text-anchor="middle">read_only</text></g>
<g class="c-amber"><rect class="c-amber" x="146" y="386" width="128" height="22" rx="11"/><text class="ts" x="210" y="401" text-anchor="middle">reversible (in tx)</text></g>
<g class="c-coral"><rect class="c-coral" x="284" y="386" width="150" height="22" rx="11"/><text class="ts" x="359" y="401" text-anchor="middle">destructive: DROP/DELETE · gated</text></g>
</svg>
