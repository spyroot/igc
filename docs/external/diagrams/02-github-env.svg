<svg width="100%" viewBox="0 0 680 412" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The github environment as a GoalEnvironment adapter</title>
<desc>An agent emits ToolActions to a GitHubEnv that implements the same GoalEnvironment interface as the Redfish env, backed by a simulator that replays recorded GitHub API JSON offline or executes live behind a gate. Below, a six-step trajectory for finding a failing CI job and opening a fix PR, colored by action risk.</desc>
<style>
svg{--surface-2:#ffffff;--surface-1:#f7f7f5;--surface-0:#f0efea;--text-primary:#1f1e1b;--text-secondary:#57564f;--text-muted:#8a897f;--border:#e3e2dc;--border-strong:#cbcabf}
.t,.th,.ts{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:var(--text-primary)}
.t,.th{font-size:14px}.th{font-weight:500}.ts{font-size:12px;fill:var(--text-secondary)}
rect.c-teal{fill:#E1F5EE;stroke:#5DCAA5}.c-teal text{fill:#04342C}
rect.c-coral{fill:#FAECE7;stroke:#F0997B}.c-coral text{fill:#7A2E15}
rect.c-amber{fill:#FBF1DD;stroke:#E9C277}.c-amber text{fill:#5A3D10}
rect.c-purple{fill:#EEEDFE;stroke:#AFA9EC}.c-purple text{fill:#26215C}
@media (prefers-color-scheme:dark){svg{--surface-2:#26251f;--surface-1:#201f1a;--surface-0:#1a1915;--text-primary:#ECEAE0;--text-secondary:#B8B6AA;--border:#3a392f;--border-strong:#4a493d}rect.c-teal{fill:#0F3E33;stroke:#1D9E75}.c-teal text{fill:#9FE1CB}rect.c-coral{fill:#3E2417;stroke:#D85A30}.c-coral text{fill:#F5C4B3}rect.c-amber{fill:#3A2E12;stroke:#C79A3A}.c-amber text{fill:#E9C277}rect.c-purple{fill:#2A2550;stroke:#7F77DD}.c-purple text{fill:#CECBF6}}
</style>
<defs>
<marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-secondary)"/></marker>
</defs>

<text class="th" x="40" y="26">The github env: same interface as redfish, recorded backend</text>

<rect x="40" y="40" width="600" height="46" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text class="th" x="58" y="62">Goal</text>
<text class="ts" x="58" y="79">find the failing CI job, then open a fix PR</text>
<text class="ts" x="624" y="68" text-anchor="end">verify() → PR open and CI green</text>

<rect x="40" y="110" width="118" height="88" rx="8" fill="var(--surface-1)" stroke="var(--border)"/>
<text class="th" x="99" y="146" text-anchor="middle">Agent</text>
<text class="ts" x="99" y="164" text-anchor="middle">+ planner</text>
<text class="ts" x="99" y="182" text-anchor="middle">emits ToolAction</text>

<rect x="196" y="100" width="234" height="108" rx="8" fill="var(--surface-1)" stroke="var(--border-strong)"/>
<text class="th" x="313" y="120" text-anchor="middle">GitHubEnv</text>
<text class="ts" x="313" y="136" text-anchor="middle">implements GoalEnvironment</text>
<text class="ts" x="208" y="158">reset(goal) → Observation</text>
<text class="ts" x="208" y="172">available_actions → [ToolAction]</text>
<text class="ts" x="208" y="186">step(action) → Transition</text>
<text class="ts" x="208" y="200">verify(goal, obs) → bool</text>

<rect x="468" y="110" width="162" height="88" rx="8" fill="var(--surface-1)" stroke="var(--border)"/>
<text class="th" x="549" y="132" text-anchor="middle">Simulator</text>
<text class="ts" x="549" y="150" text-anchor="middle">recorded GitHub JSON</text>
<text class="ts" x="549" y="166" text-anchor="middle">(endpoint, method)→resp</text>
<text class="ts" x="549" y="183" text-anchor="middle">mock ⇄ live · gated</text>

<line x1="158" y1="138" x2="192" y2="138" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<text class="ts" x="175" y="131" text-anchor="middle">step</text>
<line x1="196" y1="170" x2="162" y2="170" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<text class="ts" x="177" y="185" text-anchor="middle">obs</text>
<line x1="430" y1="138" x2="464" y2="138" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<text class="ts" x="449" y="131" text-anchor="middle">request</text>
<line x1="468" y1="170" x2="434" y2="170" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<text class="ts" x="450" y="185" text-anchor="middle">response</text>

<text class="ts" x="313" y="224" text-anchor="middle">same ABC as redfish_env · filesystem_env</text>

<text class="ts" x="40" y="246">the agent must plan a multi-step trajectory — each step is a ToolAction(tool, args, risk):</text>

<g class="c-teal"><rect class="c-teal" x="40" y="258" width="90" height="44" rx="6"/><text class="ts" x="85" y="277" text-anchor="middle">1 search</text><text class="ts" x="85" y="291" text-anchor="middle">issues</text></g>
<g class="c-teal"><rect class="c-teal" x="142" y="258" width="90" height="44" rx="6"/><text class="ts" x="187" y="277" text-anchor="middle">2 list</text><text class="ts" x="187" y="291" text-anchor="middle">ci runs</text></g>
<g class="c-teal"><rect class="c-teal" x="244" y="258" width="90" height="44" rx="6"/><text class="ts" x="289" y="277" text-anchor="middle">3 get</text><text class="ts" x="289" y="291" text-anchor="middle">run logs</text></g>
<g class="c-teal"><rect class="c-teal" x="346" y="258" width="90" height="44" rx="6"/><text class="ts" x="391" y="277" text-anchor="middle">4 read</text><text class="ts" x="391" y="291" text-anchor="middle">file</text></g>
<g class="c-amber"><rect class="c-amber" x="448" y="258" width="90" height="44" rx="6"/><text class="ts" x="493" y="277" text-anchor="middle">5 commit</text><text class="ts" x="493" y="291" text-anchor="middle">to branch</text></g>
<g class="c-amber"><rect class="c-amber" x="550" y="258" width="90" height="44" rx="6"/><text class="ts" x="595" y="277" text-anchor="middle">6 open</text><text class="ts" x="595" y="291" text-anchor="middle">pull req</text></g>

<line x1="130" y1="280" x2="142" y2="280" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<line x1="232" y1="280" x2="244" y2="280" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<line x1="334" y1="280" x2="346" y2="280" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<line x1="436" y1="280" x2="448" y2="280" stroke="var(--text-secondary)" marker-end="url(#arr)"/>
<line x1="538" y1="280" x2="550" y2="280" stroke="var(--text-secondary)" marker-end="url(#arr)"/>

<text class="ts" x="40" y="324">ToolAction args, e.g. commit(path, content) · open_pull_request(base, head, title)</text>

<g class="c-teal"><rect class="c-teal" x="40" y="344" width="96" height="22" rx="11"/><text class="ts" x="88" y="359" text-anchor="middle">read_only</text></g>
<g class="c-amber"><rect class="c-amber" x="146" y="344" width="98" height="22" rx="11"/><text class="ts" x="195" y="359" text-anchor="middle">reversible</text></g>
<g class="c-coral"><rect class="c-coral" x="254" y="344" width="130" height="22" rx="11"/><text class="ts" x="319" y="359" text-anchor="middle">destructive · gated</text></g>
<text class="ts" x="40" y="386">destructive actions (force-push, delete branch) exist but sit behind the Phase 7 approval gate</text>
</svg>
