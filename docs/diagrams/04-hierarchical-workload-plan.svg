<svg width="100%" viewBox="0 0 680 392" role="img" xmlns="http://www.w3.org/2000/svg">
<title>A high-level workload decomposed into ordered, dependent sub-goals with discovery</title>
<desc>The statement "tune BIOS, then boot Ubuntu" is extracted into atomic sub-goals with an explicit dependency hint; reboot steps are disruptive and gated; the terminal reward is clear but sparse. The agent must additionally discover the API, discover the state machine, and learn the optimal strategy.</desc>
<style>
svg{--surface-2:#ffffff;--surface-1:#f7f7f5;--surface-0:#f0efea;--text-primary:#1f1e1b;--text-secondary:#57564f;--text-muted:#8a897f;--border:#e3e2dc;--border-strong:#cbcabf}
.t,.th,.ts{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:var(--text-primary)}
.t,.th{font-size:14px}.th{font-weight:500}.ts{font-size:12px;fill:var(--text-secondary)}
rect.c-teal{fill:#E1F5EE;stroke:#5DCAA5}.c-teal text{fill:#04342C}
rect.c-coral{fill:#FAECE7;stroke:#F0997B}.c-coral text{fill:#7A2E15}
rect.c-amber{fill:#FBF1DD;stroke:#E9C277}.c-amber text{fill:#5A3D10}
rect.c-purple{fill:#EEEDFE;stroke:#AFA9EC}.c-purple text{fill:#26215C}
@media (prefers-color-scheme:dark){svg{--surface-2:#26251f;--surface-1:#201f1a;--surface-0:#1a1915;--text-primary:#ECEAE0;--text-secondary:#B8B6AA;--border:#3a392f;--border-strong:#4a493d}rect.c-teal{fill:#0F3E33;stroke:#1D9E75}.c-teal text{fill:#9FE1CB}rect.c-coral{fill:#3E2417;stroke:#D85A30}.c-coral text{fill:#F5C4B3}rect.c-amber{fill:#3A2E12;stroke:#C79A3A}.c-amber text{fill:#E9C277}rect.c-purple{fill:#2A2550;stroke:#7F77DD}.c-purple text{fill:#CECBF6}}
</style>
<defs>
<marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-secondary)"/></marker>
</defs>

<text class="th" x="40" y="26">tune BIOS, then boot Ubuntu — ordered, dependent sub-goals</text>

<rect x="40" y="40" width="600" height="46" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text class="th" x="58" y="60">high-level statement</text>
<text class="ts" x="58" y="78">"tune BIOS for this workload, then boot Ubuntu"</text>
<text class="ts" x="624" y="62" text-anchor="end">reward: Ubuntu boots (clear, but sparse)</text>

<rect x="250" y="92" width="180" height="24" rx="12" fill="var(--surface-1)" stroke="var(--border-strong)"/>
<text class="ts" x="340" y="108" text-anchor="middle">GoalExtractor: NL → GoalRefs</text>
<line x1="340" y1="86" x2="340" y2="92" stroke="var(--text-secondary)" marker-end="url(#arr3)"/>
<line x1="340" y1="116" x2="340" y2="126" stroke="var(--text-secondary)" marker-end="url(#arr3)"/>

<g class="c-amber"><rect class="c-amber" x="40" y="130" width="108" height="50" rx="6"/><text class="ts" x="94" y="151" text-anchor="middle">G1 set</text><text class="ts" x="94" y="166" text-anchor="middle">BIOS attrs</text></g>
<g class="c-amber"><rect class="c-amber" x="163" y="130" width="108" height="50" rx="6"/><text class="ts" x="217" y="151" text-anchor="middle">G2 schedule</text><text class="ts" x="217" y="166" text-anchor="middle">config job</text></g>
<g class="c-coral"><rect class="c-coral" x="286" y="130" width="108" height="50" rx="6"/><text class="ts" x="340" y="151" text-anchor="middle">G3 reboot</text><text class="ts" x="340" y="166" text-anchor="middle">→ apply</text></g>
<g class="c-amber"><rect class="c-amber" x="409" y="130" width="108" height="50" rx="6"/><text class="ts" x="463" y="151" text-anchor="middle">G4 set</text><text class="ts" x="463" y="166" text-anchor="middle">boot device</text></g>
<g class="c-coral"><rect class="c-coral" x="532" y="130" width="108" height="50" rx="6"/><text class="ts" x="586" y="151" text-anchor="middle">G5 reboot</text><text class="ts" x="586" y="166" text-anchor="middle">→ boot OS</text></g>

<line x1="148" y1="155" x2="163" y2="155" stroke="var(--text-secondary)" marker-end="url(#arr3)"/>
<line x1="271" y1="155" x2="286" y2="155" stroke="var(--text-secondary)" marker-end="url(#arr3)"/>
<line x1="394" y1="155" x2="409" y2="155" stroke="var(--text-secondary)" marker-end="url(#arr3)"/>
<line x1="517" y1="155" x2="532" y2="155" stroke="var(--text-secondary)" marker-end="url(#arr3)"/>

<text class="ts" x="40" y="200">state to discover (not given): BIOS attr Current → Pending → (reboot) → Applied · job Scheduled → Running → Done</text>

<text class="ts" x="40" y="232">what the agent must learn, not receive up front:</text>
<rect x="40" y="244" width="190" height="54" rx="8" fill="var(--surface-1)" stroke="var(--border)"/>
<text class="th" x="135" y="265" text-anchor="middle">API discovery</text>
<text class="ts" x="135" y="281" text-anchor="middle">endpoints + allowable values</text>
<text class="ts" x="135" y="294" text-anchor="middle">(idrac_ctl crawl → actions)</text>
<rect x="245" y="244" width="190" height="54" rx="8" fill="var(--surface-1)" stroke="var(--border)"/>
<text class="th" x="340" y="265" text-anchor="middle">state-space discovery</text>
<text class="ts" x="340" y="281" text-anchor="middle">learn the state machine</text>
<text class="ts" x="340" y="294" text-anchor="middle">pending/applied · jobs · reboot</text>
<rect x="450" y="244" width="190" height="54" rx="8" fill="var(--surface-1)" stroke="var(--border)"/>
<text class="th" x="545" y="265" text-anchor="middle">optimal strategy</text>
<text class="ts" x="545" y="281" text-anchor="middle">plan + RL execution</text>
<text class="ts" x="545" y="294" text-anchor="middle">fewest steps, valid order</text>

<text class="ts" x="40" y="324">reward = terminal (OS up) + per-sub-goal bonus + progress shaping; HER relabels failed runs into reachable sub-goals</text>
<text class="ts" x="40" y="348">→ = precondition: each sub-goal must succeed before the next   ·   coral = reboot/disruptive, behind the approval gate</text>
</svg>
